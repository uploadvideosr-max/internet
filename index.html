<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Informacije o vašoj vezi</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Montserrat', sans-serif;
    background: #0f172a; /* tamna pozadina */
    color: #fff;
    padding: 20px;
  }
  h2 {
    margin-bottom: 20px;
    font-weight: 600;
    font-size: 20px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 15px;
  }
  .card {
    background: #1e293b; /* tamno plava kartica */
    padding: 15px;
    border-radius: 8px;
  }
  .card strong {
    display: block;
    font-size: 12px;
    color: #94a3b8; /* svetlija siva za naslov */
    margin-bottom: 5px;
  }
  .card span {
    font-size: 14px;
  }
  .map-link {
    color: #22c55e; /* zeleni link */
    text-decoration: none;
    font-weight: 600;
  }
</style>
</head>
<body>

<h2>Informacije o vašoj vezi</h2>
<div class="grid" id="info-grid">
  <div class="card"><strong>IP ADRESA</strong><span id="ip">Učitavanje...</span></div>
  <div class="card"><strong>DRŽAVA</strong><span id="country">Učitavanje...</span></div>
  <div class="card"><strong>REGIJA</strong><span id="region">Učitavanje...</span></div>
  <div class="card"><strong>GRAD</strong><span id="city">Učitavanje...</span></div>
  <div class="card"><strong>ZIP</strong><span id="postal">Učitavanje...</span></div>
  <div class="card"><strong>ISP</strong><span id="org">Učitavanje...</span></div>
  <div class="card"><strong>ORGANIZACIJA</strong><span id="org_name">Učitavanje...</span></div>
  <div class="card"><strong>ASN</strong><span id="asn">Učitavanje...</span></div>
  <div class="card"><strong>PROXY / VPN</strong><span id="vpn">Učitavanje...</span></div>
</div>
<div style="margin-top:15px;">
  <a href="#" id="map-link" class="map-link">Prikaži na karti</a>
</div>

<script>
fetch('https://ipinfo.io/json?token=e59d522190b11d') // ubaci svoj token sa ipinfo.io
  .then(res => res.json())
  .then(data => {
    document.getElementById('ip').textContent = data.ip || '-';
    document.getElementById('country').textContent = data.country || '-';
    document.getElementById('region').textContent = data.region || '-';
    document.getElementById('city').textContent = data.city || '-';
    document.getElementById('postal').textContent = data.postal || '-';
    document.getElementById('org').textContent = data.org || '-';
    document.getElementById('org_name').textContent = data.org || '-';
    document.getElementById('asn').textContent = data.asn?.asn || '-';
    document.getElementById('vpn').textContent = data.proxy ? 'Da' : 'Ne';
    document.getElementById('map-link').href = `https://www.google.com/maps/search/?api=1&query=${data.loc}`;
  })
  .catch(err => console.error(err));
</script>

</body>
</html>
